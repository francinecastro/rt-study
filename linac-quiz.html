tory","diagram":null},{"prompt":"What does EBRT stand for?","correct":"External beam radiation therapy","options":["Energy based radiation timing","External bolus radiation test","External beam radiation therapy","Electron beam rotation therapy"],"explanation":"EBRT means external beam radiation therapy.","category":"Definitions","diagram":null},{"prompt":"Which machine became the most widely used treatment machine in radiation oncology?","correct":"Linear accelerator","options":["Linear accelerator","Contact therapy unit","Diagnostic fluoroscopy unit","Grenz ray unit"],"explanation":"The LINAC is the most widely used treatment machine in radiation oncology.","category":"History","diagram":null},{"prompt":"Who discovered x-rays?","correct":"Wilhelm Roentgen","options":["Marie Curie","Henri Becquerel","Robert Van de Graaff","Wilhelm Roentgen"],"explanation":"Wilhelm Roentgen discovered x-rays.","category":"History","diagram":null},{"prompt":"What was the first x-ray image of?","correct":"Anna Bertha Roentgen's hand","options":["A foot","A skull","Anna Bertha Roentgen's hand","Roentgen's chest"],"explanation":"The first x-ray image was of Roentgen's wife's hand.","category":"History","diagram":null},{"prompt":"Why is Anna Bertha Roentgen important in x-ray history?","correct":"Her hand was used for the first x-ray image","options":["She invented the klystron","She discovered cobalt-60","She invented the LINAC","Her hand was used for the first x-ray image"],"explanation":"Her hand is shown in the first x-ray image.","category":"History","diagram":null},{"prompt":"Cobalt-60 therapy came before what major treatment machine became common?","correct":"Linear accelerator","options":["Linear accelerator","CyberKnife only","PET scanner","MRI scanner"],"explanation":"Cobalt-60 therapy was followed by megavoltage LINAC treatment machines.","category":"History","diagram":null},{"prompt":"Which older treatment category used kilovoltage x-rays?","correct":"Grenz, contact, superfic
